services:
  php:
    image: drupalci/php-5.5.38-apache:dev
    container_name: php
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
  sql:
    image: mysql:5.7
    container_name: sql
    environment:
      MYSQL_DATABASE: test
      MYSQL_ROOT_PASSWORD:: jelszo
      MYSQL_USER: user
      MYSQL_PASSWORD: titok123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: sql
      PMA_PORT: 3307
      MYSQL_ROOT_PASSWORD: jelszo
    depends_on:
      - sql
  volumes:
    db_data: 

